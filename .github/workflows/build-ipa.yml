name: Build and Release Unsigned IPA

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Prepare Unsigned Build Settings
        run: |
          # 1. Inject Dummy Team into pbxproj more reliably
          # Find the first occurrence of PRODUCT_BUNDLE_IDENTIFIER and insert DEVELOPMENT_TEAM after it
          # We use a python script for precise pbxproj manipulation since sed is fragile
          python3 -c '
          import sys
          path = "ios/Runner.xcodeproj/project.pbxproj"
          with open(path, "r") as f:
              content = f.read()
          if "DEVELOPMENT_TEAM" not in content:
              content = content.replace("PRODUCT_BUNDLE_IDENTIFIER =", "DEVELOPMENT_TEAM = \"0000000000\";\n\t\t\t\tPRODUCT_BUNDLE_IDENTIFIER =")
          with open(path, "w") as f:
              f.write(content)
          '
          
          # 2. Update xcconfig for all configurations
          echo "CODE_SIGNING_ALLOWED=NO" >> ios/Flutter/Debug.xcconfig
          echo "CODE_SIGNING_REQUIRED=NO" >> ios/Flutter/Debug.xcconfig
          echo "CODE_SIGNING_ALLOWED=NO" >> ios/Flutter/Release.xcconfig
          echo "CODE_SIGNING_REQUIRED=NO" >> ios/Flutter/Release.xcconfig

      - name: Build iOS (Unsigned)
        run: |
          # Use --xcargs-style flags directly in environment
          export FLUTTER_XCODE_CODE_SIGNING_ALLOWED=NO
          export FLUTTER_XCODE_CODE_SIGNING_REQUIRED=NO
          export FLUTTER_XCODE_CODE_SIGN_IDENTITY=""
          export FLUTTER_XCODE_DEVELOPMENT_TEAM="0000000000"
          
          # We use the 'ipa' command but tell it not to sign. 
          # This is sometimes more reliable for producing a packaged output.
          # If this fails, we fall back to 'ios' and manual packaging.
          flutter build ios --release --no-codesign

      - name: Package Unsigned IPA
        run: |
          mkdir -p Payload
          APP_PATH="build/ios/iphoneos/Runner.app"
          if [ -d "$APP_PATH" ]; then
            echo "Found .app at $APP_PATH"
          else
            echo "Error: .app bundle not found at $APP_PATH"
            exit 1
          fi
          cp -R "$APP_PATH" Payload/
          # Ensure it's totally unsigned by removing any partial signatures
          rm -rf Payload/Runner.app/_CodeSignature
          zip -r dir_browser_unsigned.ipa Payload
          
      - name: Get Version and Build Number
        id: vars
        run: |
          VERSION=$(grep 'version: ' pubspec.yaml | sed 's/version: //')
          SHA_SHORT=$(git rev-parse --short HEAD)
          echo "tag=v${VERSION}-${SHA_SHORT}" >> $GITHUB_OUTPUT
          echo "version=${VERSION}" >> $GITHUB_OUTPUT

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: dir_browser_unsigned.ipa
          tag_name: ${{ steps.vars.outputs.tag }}
          name: Release ${{ steps.vars.outputs.version }} (${{ github.run_number }})
          body: |
            Automated build for version ${{ steps.vars.outputs.version }}
            Commit: ${{ github.sha }}
            Run Number: ${{ github.run_number }}
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

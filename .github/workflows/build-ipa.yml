name: Build and Release Unsigned IPA

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Clean and Configure Xcode for Unsigned Build
        run: |
          # 1. Clean pbxproj
          python3 clean_pbxproj.py
          
          # 2. Setup xcconfig
          echo "CODE_SIGNING_ALLOWED=NO" >> ios/Flutter/Release.xcconfig
          echo "CODE_SIGNING_REQUIRED=NO" >> ios/Flutter/Release.xcconfig
          echo "CODE_SIGN_STYLE=Manual" >> ios/Flutter/Release.xcconfig
          echo "DEVELOPMENT_TEAM=" >> ios/Flutter/Release.xcconfig
          
          # 3. Ensure Generated.xcconfig also has no signing
          # (Flutter build ios will overwrite this, but we'll try to set env vars)

      - name: Build iOS (Unsigned)
        run: |
          # Use FLUTTER_XCODE environment variables to force-disable signing
          export FLUTTER_XCODE_CODE_SIGNING_ALLOWED=NO
          export FLUTTER_XCODE_CODE_SIGNING_REQUIRED=NO
          export FLUTTER_XCODE_CODE_SIGN_IDENTITY=""
          export FLUTTER_XCODE_CODE_SIGN_STYLE=Manual
          export FLUTTER_XCODE_DEVELOPMENT_TEAM=""
          export FLUTTER_XCODE_PROVISIONING_PROFILE=""
          export FLUTTER_XCODE_PROVISIONING_PROFILE_SPECIFIER=""
          
          # Force COMPILER_INDEX_STORE_ENABLE=NO to avoid some Xcode 15 build artifacts
          export FLUTTER_XCODE_COMPILER_INDEX_STORE_ENABLE=NO
          
          # Build the .app bundle
          flutter build ios --release --no-codesign --verbose

      - name: Package Unsigned IPA
        run: |
          mkdir -p Payload
          APP_PATH="build/ios/iphoneos/Runner.app"
          if [ -d "$APP_PATH" ]; then
            echo "Found .app bundle."
          else
            echo "Error: .app bundle not found at $APP_PATH"
            exit 1
          fi
          
          # Copy to Payload
          cp -R "$APP_PATH" Payload/
          
          # COMPLETELY STRIP ANY SIGNATURE
          rm -rf Payload/Runner.app/_CodeSignature
          
          # Zip into .ipa
          zip -r dir_browser_unsigned.ipa Payload
          
      - name: Get Version
        id: vars
        run: |
          VERSION=$(grep 'version: ' pubspec.yaml | sed 's/version: //')
          SHA_SHORT=$(git rev-parse --short HEAD)
          echo "tag=v${VERSION}-${SHA_SHORT}" >> $GITHUB_OUTPUT
          echo "version=${VERSION}" >> $GITHUB_OUTPUT

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: dir_browser_unsigned.ipa
          tag_name: ${{ steps.vars.outputs.tag }}
          name: Release ${{ steps.vars.outputs.version }} (${{ github.run_number }})
          body: |
            Automated build for version ${{ steps.vars.outputs.version }}
            This is an UNSIGNED IPA for sideloading.
            Commit: ${{ github.sha }}
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

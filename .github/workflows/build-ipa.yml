name: Build & Release Unsigned IPA

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-ipa:
    runs-on: macos-latest

    steps:
      # ── 1. Source ───────────────────────────────────────────────────────────
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # ── 2. Flutter ──────────────────────────────────────────────────────────
      - name: Setup Flutter (stable)
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      # ── 3. Version tag ──────────────────────────────────────────────────────
      - name: Compute version tag
        id: ver
        run: |
          RAW=$(grep '^version:' pubspec.yaml | awk '{print $2}')
          BASE="${RAW%%+*}"
          TAG="v${BASE}+${{ github.run_number }}"
          echo "tag=$TAG"           >> "$GITHUB_OUTPUT"
          echo "name=DirXplore Lite $TAG" >> "$GITHUB_OUTPUT"
          echo "Version tag: $TAG"

      # ── 4. Build unsigned IPA ────────────────────────────────────────────────
      - name: Clean & Patch Project for Unsigned Build
        run: |
          # 1. Use the production-grade python patcher to strip signing and inject overrides
          python3 scripts/clean_ios.py
          
          # 2. Add extra bypass flags from learned workflow to Release configuration
          echo "CODE_SIGNING_REQUIRED=NO" >> ios/Flutter/Release.xcconfig
          echo "CODE_SIGNING_ALLOWED=NO" >> ios/Flutter/Release.xcconfig
          echo "CODE_SIGN_IDENTITY=" >> ios/Flutter/Release.xcconfig
          echo "CODE_SIGN_IDENTITY[sdk=iphoneos*]=" >> ios/Flutter/Release.xcconfig
          # We use a dummy team to satisfy Xcode 15's validation before it hits --no-codesign
          echo "DEVELOPMENT_TEAM=ABC123XYZ8" >> ios/Flutter/Release.xcconfig

      - name: Build iOS (no-codesign)
        run: flutter build ios --release --no-codesign --verbose

      - name: Package IPA
        id: pkg
        run: |
          APP_PATH="build/ios/iphoneos/Runner.app"
          PAYLOAD_DIR="build/ios/iphoneos/Payload"
          IPA_NAME="DirXploreLite-${{ steps.ver.outputs.tag }}.ipa"
          IPA_PATH="build/ios/iphoneos/$IPA_NAME"

          mkdir -p "$PAYLOAD_DIR"
          cp -r "$APP_PATH" "$PAYLOAD_DIR/"

          # CRITICAL: Strip code signature residues for a "totally unsigned" state
          rm -rf "$PAYLOAD_DIR/Runner.app/_CodeSignature"

          cd build/ios/iphoneos
          zip -r "$IPA_NAME" Payload
          cd ../../..

          echo "ipa_path=$IPA_PATH" >> "$GITHUB_OUTPUT"
          echo "ipa_name=$IPA_NAME" >> "$GITHUB_OUTPUT"

      # ── 5. Tag the commit ────────────────────────────────────────────────────
      - name: Create & push git tag
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag "${{ steps.ver.outputs.tag }}"
          git push origin "${{ steps.ver.outputs.tag }}"

      # ── 6. GitHub Release ────────────────────────────────────────────────────
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.ver.outputs.tag }}
          name: ${{ steps.ver.outputs.name }}
          draft: false
          prerelease: false
          body: |
            ## DirXplore Lite — Unsigned IPA

            **Version:** `${{ steps.ver.outputs.tag }}`
            **Developer:** **RAKIB**
            **Commit:** `${{ github.sha }}`
            **Branch:** `${{ github.ref_name }}`

            ### Features:
            - **HTTP Directory Browser**: Navigate servers like `http://172.16.50.4/`.
            - **SOCKS5 Proxy**: Audited handshake with full connection logs.
            - **Ping Testing**: Measure latency of your proxy servers.
            - **Theme Support**: Dark and Light mode.

            ### How to sideload
            1. Download `${{ steps.pkg.outputs.ipa_name }}` below.
            2. Open **AltStore** on your iPhone.
            3. Tap **+** → choose the `.ipa` file.
            4. The app will install and refresh every 7 days.

            > ⚠️ This is an **unsigned** build. It requires AltStore (or Sideloadly) to install.
          files: ${{ steps.pkg.outputs.ipa_path }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

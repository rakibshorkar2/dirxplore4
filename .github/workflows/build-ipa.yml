name: Build and Release Unsigned IPA

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Clean Xcode Project
        run: |
          # Use the python script to strip signing from pbxproj
          python3 clean_pbxproj.py
          
          # Ensure xcconfig is clean
          echo "CODE_SIGNING_ALLOWED=NO" >> ios/Flutter/Release.xcconfig
          echo "CODE_SIGNING_REQUIRED=NO" >> ios/Flutter/Release.xcconfig
          echo "CODE_SIGN_STYLE=Manual" >> ios/Flutter/Release.xcconfig
          
          # Patch Podfile to disable signing on all pod targets
          if [ -f ios/Podfile ]; then
            echo "post_install do |installer|
              installer.pods_project.targets.each do |target|
                target.build_configurations.each do |config|
                  config.build_settings['CODE_SIGNING_ALLOWED'] = 'NO'
                  config.build_settings['CODE_SIGNING_REQUIRED'] = 'NO'
                end
              end
            end" >> ios/Podfile
          fi

      - name: Build iOS (Unsigned)
        run: |
          # Export variables for the build process
          export FLUTTER_XCODE_CODE_SIGNING_ALLOWED=NO
          export FLUTTER_XCODE_CODE_SIGNING_REQUIRED=NO
          export FLUTTER_XCODE_CODE_SIGN_IDENTITY=""
          export FLUTTER_XCODE_CODE_SIGN_STYLE=Manual
          export FLUTTER_XCODE_DEVELOPMENT_TEAM=""
          export FLUTTER_XCODE_PROVISIONING_PROFILE=""
          export FLUTTER_XCODE_PROVISIONING_PROFILE_SPECIFIER=""
          
          # Perform the build
          flutter build ios --release --no-codesign --verbose

      - name: Package Unsigned IPA
        run: |
          mkdir -p Payload
          APP_PATH="build/ios/iphoneos/Runner.app"
          if [ -d "$APP_PATH" ]; then
            echo "Found .app at $APP_PATH"
          else
            echo "Error: .app bundle not found at $APP_PATH"
            exit 1
          fi
          cp -R "$APP_PATH" Payload/
          # Remove any potential signature artifacts
          rm -rf Payload/Runner.app/_CodeSignature
          zip -r dir_browser_unsigned.ipa Payload
          
      - name: Get Version
        id: vars
        run: |
          VERSION=$(grep 'version: ' pubspec.yaml | sed 's/version: //')
          SHA_SHORT=$(git rev-parse --short HEAD)
          echo "tag=v${VERSION}-${SHA_SHORT}" >> $GITHUB_OUTPUT
          echo "version=${VERSION}" >> $GITHUB_OUTPUT

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: dir_browser_unsigned.ipa
          tag_name: ${{ steps.vars.outputs.tag }}
          name: Release ${{ steps.vars.outputs.version }} (${{ github.run_number }})
          body: |
            Automated build for version ${{ steps.vars.outputs.version }}
            Commit: ${{ github.sha }}
            Run Number: ${{ github.run_number }}
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

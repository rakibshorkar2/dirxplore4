name: Production Unsigned iOS Build

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Flutter Pub Get
        run: flutter pub get

      - name: Patch Xcode Project for Unsigned Build
        run: |
          # Use our production-grade python patcher
          # This script will run before flutter build
          python3 scripts/clean_ios.py

      - name: Build iOS .app (Unsigned)
        run: |
          # flutter build ios handles pod install automatically if needed.
          # We use --no-codesign to tell flutter not to try signing the final bundle.
          flutter build ios --release --no-codesign --verbose

      - name: Package Unsigned .ipa
        run: |
          # Standard iOS IPA structure
          mkdir -p Payload
          
          APP_PATH="build/ios/iphoneos/Runner.app"
          if [ -d "$APP_PATH" ]; then
            echo "Found .app bundle at $APP_PATH"
          else
            echo "ERROR: .app bundle not found!"
            exit 1
          fi
          
          # Copy .app into Payload
          cp -R "$APP_PATH" Payload/
          
          # Remove any partial signature data to ensure it is "totally unsigned"
          # This is critical for AltStore and Sideloadly to work correctly
          rm -rf Payload/Runner.app/_CodeSignature
          
          # Zip into .ipa
          zip -r dir_browser_unsigned.ipa Payload
          
      - name: Upload .app as Artifact
        uses: actions/upload-artifact@v4
        with:
          name: runner-app
          path: build/ios/iphoneos/Runner.app
          retention-days: 7

      - name: Upload .ipa as Artifact
        uses: actions/upload-artifact@v4
        with:
          name: unsigned-ipa
          path: dir_browser_unsigned.ipa
          retention-days: 7

      - name: Get Version for Release
        id: vars
        run: |
          VERSION=$(grep 'version: ' pubspec.yaml | sed 's/version: //')
          SHA_SHORT=$(git rev-parse --short HEAD)
          echo "tag=v${VERSION}-${SHA_SHORT}" >> $GITHUB_OUTPUT
          echo "version=${VERSION}" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dir_browser_unsigned.ipa
          tag_name: ${{ steps.vars.outputs.tag }}
          name: Release ${{ steps.vars.outputs.version }} (Build ${{ github.run_number }})
          body: |
            ### Unsigned iOS Build
            - Version: `${{ steps.vars.outputs.version }}`
            - Developer: **RAKIB**
            - Sideloading: Compatible with **AltStore**, **Sideloadly**, and **TrollStore**.
            - Commit: `${{ github.sha }}`
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

name: Build and Release Unsigned IPA

on:
  push:
    branches: [ main ]
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Build iOS (Unsigned)
        run: |
          # Inject a dummy Development Team ID into the project file
          # We search for PRODUCT_BUNDLE_IDENTIFIER and append DEVELOPMENT_TEAM after it
          # This ensures the key exists even if the template omitted it.
          sed -i '' '/PRODUCT_BUNDLE_IDENTIFIER/a\'$'\n''\				DEVELOPMENT_TEAM = "0000000000";' ios/Runner.xcodeproj/project.pbxproj
          
          # Force disable code signing for all targets via environment variables
          export FLUTTER_XCODE_CODE_SIGNING_ALLOWED=NO
          export FLUTTER_XCODE_CODE_SIGNING_REQUIRED=NO
          export FLUTTER_XCODE_CODE_SIGN_IDENTITY=""
          export FLUTTER_XCODE_EXPANDED_CODE_SIGN_IDENTITY=""
          export FLUTTER_XCODE_EXPANDED_CODE_SIGN_IDENTITY_NAME=""
          export FLUTTER_XCODE_EXPANDED_PROVISIONING_PROFILE=""

          flutter build ios --release --no-codesign

      - name: Package IPA
        run: |
          mkdir -p Payload
          cp -r build/ios/iphoneos/Runner.app Payload/
          zip -r dir_browser_unsigned.ipa Payload
          
      - name: Get Version
        id: get_version
        run: |
          VERSION=$(grep 'version: ' pubspec.yaml | sed 's/version: //')
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT

      - name: Create Release
        uses: softprops/action-gh-release@v1
        if: startsWith(github.ref, 'refs/tags/') || github.ref == 'refs/heads/main'
        with:
          files: dir_browser_unsigned.ipa
          tag_name: v${{ steps.get_version.outputs.VERSION }}
          name: Release v${{ steps.get_version.outputs.VERSION }}
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

name: Build and Release Unsigned IPA

on:
  push:
    branches: [ main ]
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Build Frameworks (to satisfy Xcode)
        run: flutter build ios --release --no-codesign

      - name: Package Unsigned IPA
        run: |
          # 1. Create a Payload folder
          mkdir -p Payload
          
          # 2. Find the .app bundle. 
          # Flutter build ios --no-codesign puts it in build/ios/iphoneos/Runner.app
          APP_PATH="build/ios/iphoneos/Runner.app"
          
          if [ -d "$APP_PATH" ]; then
            echo "Found .app at $APP_PATH"
          else
            echo "Error: .app bundle not found at $APP_PATH"
            exit 1
          fi

          # 3. Copy .app to Payload
          cp -R "$APP_PATH" Payload/
          
          # 4. Strip any existing code signature (just to be safe/totally unsigned)
          # Note: Unsigned IPAs for AltStore/Sideloadly are essentially just the zipped .app in a Payload folder
          rm -rf Payload/Runner.app/_CodeSignature
          
          # 5. Zip it into an .ipa
          zip -r dir_browser_unsigned.ipa Payload
          
      - name: Get Version
        id: get_version
        run: |
          VERSION=$(grep 'version: ' pubspec.yaml | sed 's/version: //')
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT

      - name: Create Release
        uses: softprops/action-gh-release@v1
        if: startsWith(github.ref, 'refs/tags/') || github.ref == 'refs/heads/main'
        with:
          files: dir_browser_unsigned.ipa
          tag_name: v${{ steps.get_version.outputs.VERSION }}
          name: Release v${{ steps.get_version.outputs.VERSION }}
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

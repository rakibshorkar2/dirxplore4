name: Build and Release Unsigned IPA

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Build Frameworks (to satisfy Xcode)
        run: |
          # Inject dummy team into the project file
          sed -i '' 's/DEVELOPMENT_TEAM = "";/DEVELOPMENT_TEAM = "0000000000";/g' ios/Runner.xcodeproj/project.pbxproj || true
          
          # Force disable code signing for all targets via environment variables
          export FLUTTER_XCODE_CODE_SIGNING_ALLOWED=NO
          export FLUTTER_XCODE_CODE_SIGNING_REQUIRED=NO
          export FLUTTER_XCODE_CODE_SIGN_IDENTITY=""
          export FLUTTER_XCODE_EXPANDED_CODE_SIGN_IDENTITY=""
          export FLUTTER_XCODE_EXPANDED_CODE_SIGN_IDENTITY_NAME=""
          export FLUTTER_XCODE_EXPANDED_PROVISIONING_PROFILE=""
          
          # Build without codesign
          flutter build ios --release --no-codesign

      - name: Package Unsigned IPA
        run: |
          mkdir -p Payload
          APP_PATH="build/ios/iphoneos/Runner.app"
          if [ -d "$APP_PATH" ]; then
            echo "Found .app at $APP_PATH"
          else
            echo "Error: .app bundle not found at $APP_PATH"
            exit 1
          fi
          cp -R "$APP_PATH" Payload/
          rm -rf Payload/Runner.app/_CodeSignature
          zip -r dir_browser_unsigned.ipa Payload
          
      - name: Get Version and Build Number
        id: vars
        run: |
          VERSION=$(grep 'version: ' pubspec.yaml | sed 's/version: //')
          SHA_SHORT=$(git rev-parse --short HEAD)
          echo "tag=v${VERSION}-${SHA_SHORT}" >> $GITHUB_OUTPUT
          echo "version=${VERSION}" >> $GITHUB_OUTPUT

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: dir_browser_unsigned.ipa
          tag_name: ${{ steps.vars.outputs.tag }}
          name: Release ${{ steps.vars.outputs.version }} (${{ github.run_number }})
          body: |
            Automated build for version ${{ steps.vars.outputs.version }}
            Commit: ${{ github.sha }}
            Run Number: ${{ github.run_number }}
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
